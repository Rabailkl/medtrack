<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MedTrack — Medicine Reminder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --green: #0e8a64;
  --green-light: #e0f5ec;
  --green-mid: #0a7c5c;
  --green-dark: #075e46;
  --amber: #f59e0b;
  --red: #ef4444;
  --red-light: #fef2f2;
  --blue: #3b82f6;
  --blue-light: #eff6ff;
  --orange: #f97316;
  --orange-light: #fff7ed;
  --bg: #f4f6f3;
  --surface: #ffffff;
  --surface2: #f8faf7;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1f1c;
  --text2: #5a6460;
  --text3: #9aada6;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12), 0 0 1px rgba(0,0,0,0.08);
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1410;
    --surface: #1a201c;
    --surface2: #202820;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8ede9;
    --text2: #8fa898;
    --text3: #4d6357;
    --green-light: #0e2a1e;
    --red-light: #2a0e0e;
    --blue-light: #0e1a2a;
    --orange-light: #2a1a0e;
    --shadow: 0 2px 12px rgba(0,0,0,0.3), 0 0 1px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.4), 0 0 1px rgba(0,0,0,0.4);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  font-family: var(--font-body);
  color: var(--text);
  overflow: hidden;
}

/* ── SHELL ── */
#app {
  max-width: 430px;
  height: 100dvh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--green-mid);
  padding: 52px 20px 20px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.header::before {
  content: '';
  position: absolute;
  top: -60px; right: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.header::after {
  content: '';
  position: absolute;
  bottom: -30px; left: 30px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  position: relative;
  z-index: 1;
}
.header-brand { color: white; }
.brand-name {
  font-family: var(--font-display);
  font-size: 28px;
  line-height: 1;
  letter-spacing: -0.5px;
}
.brand-date {
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  margin-top: 4px;
  font-weight: 300;
  letter-spacing: 0.02em;
}
.header-add-btn {
  width: 38px; height: 38px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  color: white;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.15s;
}
.header-add-btn:hover { background: rgba(255,255,255,0.25); }
.header-stats {
  display: flex;
  gap: 16px;
  margin-top: 18px;
  position: relative; z-index: 1;
}
.hstat {
  flex: 1;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.hstat-val { font-size: 22px; font-weight: 600; color: white; line-height: 1; }
.hstat-label { font-size: 10px; color: rgba(255,255,255,0.65); margin-top: 3px; letter-spacing: 0.04em; text-transform: uppercase; }
.progress-row {
  display: flex; align-items: center; gap: 10px;
  margin-top: 14px;
  position: relative; z-index: 1;
}
.progress-track {
  flex: 1; height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: white; border-radius: 2px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}
.progress-pct { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 500; min-width: 30px; text-align: right; }

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1; padding: 10px 4px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 500; color: var(--text3);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.15s; user-select: none;
  letter-spacing: 0.03em; text-transform: uppercase;
}
.tab i { font-size: 20px; }
.tab.active { color: var(--green-mid); border-bottom-color: var(--green-mid); }

/* ── SCROLL AREA ── */
.scroll-area {
  flex: 1; overflow-y: auto;
  padding: 16px 16px 80px;
  -webkit-overflow-scrolling: touch;
}
.scroll-area::-webkit-scrollbar { width: 0; }

/* ── SECTION LABEL ── */
.sec-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text3);
  margin: 20px 0 10px;
}
.sec-label:first-child { margin-top: 0; }

/* ── MED CARD ── */
.med-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  box-shadow: var(--shadow);
}
.med-card:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.med-card:active { transform: scale(0.98); }
.med-card.done { opacity: 0.55; }
.med-card.done .med-name { text-decoration: line-through; }

.med-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.med-info { flex: 1; min-width: 0; }
.med-name { font-size: 15px; font-weight: 500; color: var(--text); }
.med-dose { font-size: 12px; color: var(--text2); margin-top: 2px; }
.med-note {
  font-size: 11px; color: var(--text2);
  background: var(--surface2); border-radius: 6px;
  padding: 3px 8px; margin-top: 5px; display: inline-block;
  border: 1px solid var(--border);
  font-style: italic;
}
.med-right {
  display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
  flex-shrink: 0;
}
.time-chip {
  font-size: 12px; font-weight: 500; padding: 4px 10px;
  border-radius: 20px; white-space: nowrap;
}
.time-chip.overdue { background: var(--red-light); color: var(--red); }
.time-chip.due-soon { background: var(--orange-light); color: var(--orange); }
.time-chip.upcoming { background: var(--blue-light); color: var(--blue); }
.time-chip.done { background: var(--green-light); color: var(--green); }
.time-chip.neutral { background: var(--surface2); color: var(--text2); }

.check-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: transparent; color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px;
  transition: all 0.18s;
}
.check-btn.checked { background: var(--green-mid); border-color: var(--green-mid); color: white; }
.check-btn:hover:not(.checked) { border-color: var(--green-mid); color: var(--green-mid); }

.alert-dot {
  position: absolute; top: 10px; right: 10px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--orange); border: 2px solid var(--surface);
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.6} }

/* ── EMPTY STATE ── */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--text3);
}
.empty i { font-size: 52px; margin-bottom: 14px; display: block; opacity: 0.4; }
.empty p { font-size: 14px; }
.empty small { font-size: 12px; opacity: 0.7; margin-top: 4px; display: block; }

/* ── UPLOAD TAB ── */
.upload-zone {
  border: 2px dashed var(--border2);
  border-radius: var(--radius);
  padding: 36px 20px;
  text-align: center; cursor: pointer;
  transition: all 0.15s; margin-bottom: 16px;
  background: var(--surface);
}
.upload-zone:hover { border-color: var(--green-mid); background: var(--green-light); }
.upload-zone i { font-size: 40px; color: var(--text3); margin-bottom: 10px; display: block; }
.upload-zone .uz-title { font-size: 14px; font-weight: 500; color: var(--text); }
.upload-zone .uz-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

.ai-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}
.ai-box-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
}
.ai-box-header i { font-size: 20px; color: var(--green-mid); }
.ai-box-header span { font-size: 14px; font-weight: 600; color: var(--text); }
.ai-thinking-dots {
  display: flex; justify-content: center; gap: 6px; padding: 20px 0;
}
.ai-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green-mid); animation: bounce 1.3s infinite;
}
.ai-dot:nth-child(2){animation-delay:.15s}
.ai-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(0.7);opacity:0.4}40%{transform:scale(1.1);opacity:1}}

/* Multi-page queue */
.page-queue {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 12px;
}
.page-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
}
.page-thumb {
  width: 40px; height: 40px; border-radius: 7px;
  object-fit: cover; flex-shrink: 0;
  border: 1px solid var(--border);
}
.page-thumb-placeholder {
  width: 40px; height: 40px; border-radius: 7px;
  background: var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-size: 18px;
}
.page-info { flex: 1; min-width: 0; }
.page-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.page-status { font-size: 11px; color: var(--text2); margin-top: 2px; }
.page-status.scanning { color: var(--orange); }
.page-status.done { color: var(--green); }
.page-status.error { color: var(--red); }
.page-remove {
  width: 26px; height: 26px; border-radius: 50%; border: none;
  background: var(--red-light); color: var(--red);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px; flex-shrink: 0;
}
.scan-actions { display: flex; gap: 8px; margin-bottom: 12px; }
.scan-add-btn {
  flex: 1; padding: 10px;
  border: 1.5px dashed var(--border2); border-radius: var(--radius-sm);
  background: transparent; color: var(--text2);
  font-size: 12px; font-family: var(--font-body);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  cursor: pointer; transition: all 0.15s;
}
.scan-add-btn:hover { border-color: var(--green-mid); color: var(--green-mid); }
.scan-go-btn {
  flex: 1.5; padding: 10px;
  background: var(--green-mid); border: none; border-radius: var(--radius-sm);
  color: white; font-size: 13px; font-weight: 600; font-family: var(--font-body);
  cursor: pointer; transition: background 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.scan-go-btn:hover { background: var(--green-dark); }
.scan-go-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* AI result rows — editable */
.ai-med-row {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.ai-med-row:last-child { border-bottom: none; }
.ai-med-row-top {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.ai-med-icon {
  width: 34px; height: 34px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  flex-shrink: 0;
}
.ai-med-name { font-size: 13px; font-weight: 500; color: var(--text); }
.ai-med-detail { font-size: 11px; color: var(--text2); margin-top: 2px; }
.ai-edit-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px;
}
.ai-edit-field { display: flex; flex-direction: column; gap: 3px; }
.ai-edit-label { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.ai-edit-input {
  width: 100%; padding: 7px 10px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text);
  font-size: 12px; font-family: var(--font-body); outline: none;
  transition: border-color 0.15s;
}
.ai-edit-input:focus { border-color: var(--green-mid); }
.ai-edit-input.highlight { border-color: var(--orange); background: var(--orange-light); }
.ai-times-edit { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
.ai-time-chip-edit {
  display: flex; align-items: center; gap: 4px;
  background: var(--green-light); border-radius: 20px;
  padding: 3px 4px 3px 9px; border: 1px solid transparent;
}
.ai-time-input {
  border: none; background: transparent; color: var(--green-dark);
  font-size: 11px; font-weight: 500; font-family: var(--font-body);
  width: 52px; outline: none; padding: 0;
}
.ai-time-remove {
  width: 16px; height: 16px; border-radius: 50%; border: none;
  background: rgba(0,0,0,0.1); color: var(--green-dark);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 10px; flex-shrink: 0;
}
.add-ai-time-btn {
  font-size: 11px; color: var(--green-mid); background: transparent;
  border: 1px dashed rgba(14,138,100,0.4); border-radius: 20px;
  padding: 3px 9px; cursor: pointer; font-family: var(--font-body);
}
.edit-hint {
  display: flex; align-items: center; gap: 6px;
  background: var(--blue-light); border-radius: var(--radius-sm);
  padding: 8px 12px; margin-bottom: 10px;
  font-size: 11px; color: var(--blue);
}
.edit-hint i { font-size: 14px; flex-shrink: 0; }

.confirm-btn {
  width: 100%; padding: 13px;
  background: var(--green-mid); color: white;
  border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; font-family: var(--font-body);
  cursor: pointer; margin-top: 12px;
  transition: background 0.15s;
  letter-spacing: 0.01em;
}
.confirm-btn:hover { background: var(--green-dark); }
.discard-btn {
  width: 100%; padding: 11px;
  background: transparent; color: var(--text2);
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  font-size: 13px; font-family: var(--font-body);
  cursor: pointer; margin-top: 8px;
}

.info-card {
  background: var(--green-light);
  border: 1px solid rgba(14,138,100,0.15);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex; gap: 12px; align-items: flex-start;
  margin-top: 8px;
}
.info-card i { font-size: 18px; color: var(--green-mid); flex-shrink: 0; margin-top: 1px; }
.info-card p { font-size: 12px; color: var(--text2); line-height: 1.5; }

/* ── HISTORY TAB ── */
.stat-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 20px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  box-shadow: var(--shadow);
}
.stat-val { font-size: 28px; font-weight: 600; color: var(--text); font-family: var(--font-display); }
.stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.stat-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }

.streak-row { display: flex; gap: 5px; margin-bottom: 20px; }
.streak-seg {
  flex: 1; height: 6px; border-radius: 3px;
  background: var(--border);
}
.streak-seg.on { background: var(--green-mid); }
.streak-seg.today { background: var(--green-mid); box-shadow: 0 0 6px rgba(14,138,100,0.5); }

.week-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; margin-bottom: 20px; }
.week-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.week-bar {
  width: 100%; border-radius: 5px;
  background: var(--green-mid); min-height: 4px;
  transition: height 0.4s;
}
.week-bar.dim { background: var(--border); }
.week-label { font-size: 10px; color: var(--text3); }

.cal-header-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 5px; }
.cal-dh { text-align: center; font-size: 10px; color: var(--text3); font-weight: 500; padding: 2px 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-cell {
  aspect-ratio: 1; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--text2); cursor: pointer;
  transition: background 0.12s;
  position: relative;
}
.cal-cell.today { background: var(--green-mid); color: white; font-weight: 600; }
.cal-cell.has { color: var(--text); }
.cal-cell.complete { background: var(--green-light); color: var(--green-dark); font-weight: 500; }
.cal-cell.other-month { opacity: 0.3; }
.cal-cell.has::after {
  content: '';
  position: absolute; bottom: 3px;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--green-mid);
}
.cal-cell.today::after { background: white; }
.cal-cell.complete::after { background: var(--green-dark); }

/* ── SCHEDULE TAB ── */
.sched-med-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow);
}
.sched-med-info { flex: 1; }
.sched-med-name { font-size: 14px; font-weight: 500; color: var(--text); }
.sched-med-dose { font-size: 12px; color: var(--text2); margin-top: 2px; }
.sched-times { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.sched-time-chip {
  font-size: 11px; padding: 3px 9px;
  background: var(--green-light); color: var(--green-dark);
  border-radius: 20px; font-weight: 500;
}
.del-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid var(--border2);
  background: transparent; color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; flex-shrink: 0;
  transition: all 0.15s;
}
.del-btn:hover { background: var(--red-light); border-color: var(--red); color: var(--red); }

/* ── ADD MED BTN ── */
.add-ghost-btn {
  width: 100%;
  padding: 12px;
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius);
  background: transparent; color: var(--text2);
  font-size: 13px; font-family: var(--font-body);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer; transition: all 0.15s;
  margin-top: 4px;
}
.add-ghost-btn:hover { border-color: var(--green-mid); color: var(--green-mid); }

/* ── MODAL ── */
.modal-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: flex-end;
  z-index: 100; animation: fadein 0.15s;
}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal-sheet {
  width: 100%;
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 0 20px 40px;
  animation: slideup 0.25s cubic-bezier(.4,0,.2,1);
  max-height: 85dvh; overflow-y: auto;
}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle {
  width: 36px; height: 4px; background: var(--border2);

<script type="module">
// ═══════════════════════════════════════════════════
//  FIREBASE SETUP
// ═══════════════════════════════════════════════════
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc,
         collection, getDocs, deleteDoc,
         writeBatch }                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-orPauGM9Jsog9l7jWa0cwJe05RYFQcU",
  authDomain: "medtrack-1aefa.firebaseapp.com",
  projectId: "medtrack-1aefa",
  storageBucket: "medtrack-1aefa.firebasestorage.app",
  messagingSenderId: "264694390617",
  appId: "1:264694390617:web:cf0d6654285a8f65baf648"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

// ── simple PIN hash (SHA-256) ──
async function hashPin(pin) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── Firestore helpers ──
// User doc:   users/{phone}  → { pinHash, createdAt }
// Data doc:   users/{phone}/data/main → { meds, history, readings, notifAsked }
function userRef(phone)     { return doc(db, 'users', phone); }
function dataRef(phone)     { return doc(db, 'users', phone, 'data', 'main'); }

async function fbGetUser(phone) {
  const snap = await getDoc(userRef(phone));
  return snap.exists() ? snap.data() : null;
}
async function fbCreateUser(phone, pinHash) {
  await setDoc(userRef(phone), { pinHash, createdAt: Date.now() });
}
async function fbLoadData(phone) {
  const snap = await getDoc(dataRef(phone));
  return snap.exists() ? snap.data() : null;
}
async function fbSaveData(phone, data) {
  // strip un-serialisable stuff (File objects in pageQueue live only in ui)
  await setDoc(dataRef(phone), {
    meds: data.meds || [],
    history: data.history || {},
    readings: data.readings || [],
    notifAsked: data.notifAsked || false,
  });
}

// ═══════════════════════════════════════════════════
//  CONSTANTS & HELPERS
// ═══════════════════════════════════════════════════
const COLORS = ['#e0f5ec','#fde8e8','#eff6ff','#fff7ed','#f5f3ff','#fefce8','#f0fdf4','#fff1f2'];
const ICONS = ['💊','🔵','🟡','🔴','🟢','⚪','🩺','💉','🧴','🫀'];
const DAYS = ['S','M','T','W','T','F','S'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function pad(n) { return n.toString().padStart(2,'0'); }
function timeToMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function fmt12(t) { const [h,m]=t.split(':').map(Number); const ap=h>=12?'PM':'AM'; return `${h%12||12}:${pad(m)} ${ap}`; }
function nowStr() { const n=new Date(); return `${pad(n.getHours())}:${pad(n.getMinutes())}`; }
function todayKey() { const n=new Date(); return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`; }

function doseStatus(timeStr) {
  const nm = timeToMin(nowStr());
  const dm = timeToMin(timeStr);
  const diff = dm - nm;
  if (diff < -15) return 'overdue';
  if (diff <= 5) return 'due-soon';
  return 'upcoming';
}

// ═══════════════════════════════════════════════════
//  STATE (localStorage-backed)
// ═══════════════════════════════════════════════════
let state = {
  meds: [],
  history: {},     // { "YYYY-MM-DD": { "medId-time": true } }
  notifAsked: false,
  readings: [],    // [{ id, type:'bsr'|'bp', datetime, bsr, systolic, diastolic, notes }]
};

function freshState() {
  return {
    meds: [],
    history: {},
    readings: [],
    notifAsked: false,
  };
}

function loadState() {
  // No-op — state is loaded from Firestore after login
  state = freshState();
}

async function saveState() {
  if (currentUser) {
    try { await fbSaveData(currentUser.phone, state); } catch(e) { console.warn('Save failed', e); }
  }
}

// ═══════════════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════════════
let scheduledNotifs = {};
function scheduleNotifications() {
  // Clear old
  Object.values(scheduledNotifs).forEach(clearTimeout);
  scheduledNotifs = {};
  if (Notification.permission !== 'granted') return;

  const now = new Date();
  state.meds.forEach(med => {
    med.times.forEach(t => {
      const key = `${med.id}-${t}`;
      const done = (state.history[todayKey()] || {})[key];
      if (done) return;
      const [h, m] = t.split(':').map(Number);
      const target = new Date(); target.setHours(h, m-5, 0, 0);
      const ms = target - now;
      if (ms > 0 && ms < 24*60*60*1000) {
        scheduledNotifs[key] = setTimeout(() => {
          new Notification('MedTrack Reminder 💊', {
            body: `Time to take ${med.name} (${med.dose}) in 5 minutes`,
            icon: '💊',
            tag: key,
          });
        }, ms);
      }
    });
  });
}

async function requestNotifications() {
  if ('Notification' in window) {
    const perm = await Notification.requestPermission();
    state.notifAsked = true;
    saveState();
    if (perm === 'granted') scheduleNotifications();
    render();
  }
}

// ═══════════════════════════════════════════════════
//  UI STATE
// ═══════════════════════════════════════════════════
let ui = {
  tab: 'today',
  toast: null,
  toastTimer: null,
  modal: null,
  // scan states: idle | queued | scanning | result
  uploadState: 'idle',
  // queue: [{ id, file, name, dataUrl, mime, status: 'pending'|'scanning'|'done'|'error', found:0 }]
  pageQueue: [],
  aiResult: null,  // flat array of editable med objects
  editMed: null,
  newMed: { name:'', dose:'', times:['08:00'], notes:'', color: COLORS[0], icon: ICONS[0] },

function toggleDone(key, medName) {

  if (!state.history[tk]) state.history[tk] = {};

// ═══════════════════════════════════════════════════
//  FILE UPLOAD → QUEUE
// ═══════════════════════════════════════════════════
function readFileAsDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = ev => res(ev.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function handleFileSelect(e) {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  for (const file of files) {
    const dataUrl = await readFileAsDataUrl(file);
    ui.pageQueue.push({
      id: uid(),
      file,
      name: file.name || `Page ${ui.pageQueue.length + 1}`,
      dataUrl,
      mime: file.type || 'image/jpeg',
      status: 'pending',
      found: 0,
    });
  }
  ui.uploadState = 'queued';
  e.target.value = '';
  render();
}

async function scanPage(page) {
  const b64 = page.dataUrl.split(',')[1];
  page.status = 'scanning'; render();
  try {
  const resp = await fetch('/.netlify/functions/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1200,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: page.mime, data: b64 } },
            { type: 'text', text: 'Extract all medicines from this prescription or schedule image. Return ONLY a valid JSON array, no markdown, no backticks, no extra text. Format: [{"name":"Medicine Name","dose":"dose amount","times":["HH:MM"],"notes":"instructions","category":"condition"}]. Use 24-hour time. List each daily dose time separately. If no medicine schedule found, return [].' }
          ]
        }]
      })
    });
    const data = await resp.json();
    const raw = (data.content||[]).find(b=>b.type==='text')?.text || '[]';
    let parsed = [];
    try { parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); } catch(e2){}
    page.status = 'done';
    page.found = parsed.length;
    return parsed;
  } catch(err) {
    page.status = 'error';
    return [];
  }
}

async function startScan() {
  const pending = ui.pageQueue.filter(p => p.status === 'pending' || p.status === 'error');
  if (!pending.length) return;
  ui.uploadState = 'scanning';
  render();
  let allMeds = [];
  for (const page of pending) {
    const meds = await scanPage(page);
    allMeds.push(...meds);
    render();
  }
  if (allMeds.length > 0) {
    // De-duplicate by name (case-insensitive)
    const seen = new Set();
    const deduped = allMeds.filter(m => {
      const key = (m.name||'').toLowerCase().trim();
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
    // Make editable copies
    ui.aiResult = deduped.map((m, i) => ({
      _id: uid(),
      name: m.name || 'Medicine',
      dose: m.dose || '',
      times: Array.isArray(m.times) && m.times.length ? [...m.times] : ['08:00'],
      notes: m.notes || '',
      category: m.category || '',
      color: COLORS[i % COLORS.length],
      icon: ICONS[i % ICONS.length],
    }));
    ui.uploadState = 'result';
  } else {
    ui.uploadState = 'queued';
    showToast('No medicines detected — check image quality', 'ti-alert-circle');
  }
  render();
}

function updateAiMed(id, field, value) {

function addAiTime(id) {

function removeAiTime(id, idx) {

function confirmAI() {
  const added = ui.aiResult.map(m => ({
    id: uid(),
    name: (m.name || 'Medicine').trim(),
    dose: (m.dose || '').trim(),

// ═══════════════════════════════════════════════════
//  RENDER ENGINE (vanilla DOM)
// ═══════════════════════════════════════════════════
function el(tag, props={}, ...children) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c === null || c === undefined) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}
function icon(name, extra='') { const i=document.createElement('i'); i.className=`ti ti-${name}${extra?' '+extra:''}`; i.setAttribute('aria-hidden','true'); return i; }
function text(s) { return document.createTextNode(s); }

function renderToday() {
  const wrap = el('div',{});

  const todayDone = state.history[tk] || {};

  // Notification banner
  if ('Notification' in window && Notification.permission === 'default' && !state.notifAsked) {
    const nb = el('div',{class:'notif-banner', onclick: requestNotifications});
    nb.appendChild(icon('bell-ringing'));
    const np = el('p',{}, 'Enable notifications to get 5-minute reminders before each dose.');
    nb.appendChild(np);
    nb.appendChild(el('span',{class:'nb-action'}, 'Enable →'));
    wrap.appendChild(nb);
  }

  const allDoses = state.meds.flatMap(m => m.times.map(t=>({...m, time:t, key:`${m.id}-${t}`})));
  allDoses.sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));

  if (!allDoses.length) {
    const empty = el('div',{class:'empty'});
    empty.appendChild(icon('pill-off'));
    empty.appendChild(el('p',{},'No medicines scheduled'));
    empty.appendChild(el('small',{},'Tap + to add your first medicine, or scan a prescription'));
    wrap.appendChild(empty);
  } else {
    ['overdue','due-soon','upcoming'].forEach(group => {
      const items = allDoses.filter(d => !todayDone[d.key] && doseStatus(d.time) === group);
      if (!items.length) return;
      const labels = {overdue:'Overdue', 'due-soon':'Due soon', upcoming:'Upcoming'};
      const lbl = el('p',{class:'sec-label'}, labels[group]);
      if (group==='overdue') lbl.style.color='var(--red)';
      if (group==='due-soon') lbl.style.color='var(--orange)';
      wrap.appendChild(lbl);
      items.forEach(d => wrap.appendChild(renderDoseCard(d, todayDone, group)));
    });

    // Done
    const doneItems = allDoses.filter(d => todayDone[d.key]);
    if (doneItems.length) {
      wrap.appendChild(el('p',{class:'sec-label', style:{marginTop:'20px'}}, 'Completed'));
      doneItems.forEach(d => wrap.appendChild(renderDoseCard(d, todayDone, 'done')));

  addBtn.appendChild(icon('plus')); addBtn.appendChild(text('Add medicine manually'));
  wrap.appendChild(addBtn);
  return wrap;

function renderDoseCard(d, todayDone, group) {
  const isDone = !!todayDone[d.key];
  const card = el('div', {class:`med-card${isDone?' done':''}`, onclick:()=>toggleDone(d.key, d.name)});

  if (group === 'due-soon') card.appendChild(el('div',{class:'alert-dot'}));

  const ico = el('div',{class:'med-icon',style:{background:d.color}}, d.icon);
  card.appendChild(ico);

  const info = el('div',{class:'med-info'});
  info.appendChild(el('div',{class:'med-name'}, d.name));
  info.appendChild(el('div',{class:'med-dose'}, `${d.dose}${d.category?' · '+d.category:''}`));
  if (d.notes) info.appendChild(el('div',{class:'med-note'}, d.notes));
  card.appendChild(info);

  const right = el('div',{class:'med-right'});
  const chipClass = isDone ? 'time-chip done' : `time-chip ${group}`;
  right.appendChild(el('span',{class:chipClass}, fmt12(d.time)));

  const cb = el('button',{class:`check-btn${isDone?' checked':''}`, 'aria-label':'Mark taken',
    onclick:(e)=>{e.stopPropagation();toggleDone(d.key, d.name);}});
  cb.appendChild(icon('check'));
  right.appendChild(cb);
  card.appendChild(right);
  return card;
}

function renderHistory() {
  const wrap = el('div',{});
  const today = new Date();
  const tk = todayKey();

  // Stats
  const allDoses = state.meds.flatMap(m=>m.times.map(t=>`${m.id}-${t}`));
  const doneToday = allDoses.filter(k=>(state.history[tk]||{})[k]).length;
  const total = allDoses.length;
  const pct = total ? Math.round(doneToday/total*100) : 0;

  // Streak calculation
  let streak = 0;
  for (let i=0; i<30; i++) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const k = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const hist = state.history[k] || {};
    const doseKeys = state.meds.flatMap(m=>m.times.map(t=>`${m.id}-${t}`));
    if (!doseKeys.length) break;
    const done = doseKeys.filter(dk=>hist[dk]).length;
    if (done > 0) streak++; else if (i>0) break;
  }

  const sg = el('div',{class:'stat-grid'});
  [
    [pct+'%', 'Today', `${doneToday}/${total} doses`],
    [streak+'d', 'Streak', 'days in a row'],
    [state.meds.length+'', 'Medicines', 'active schedules'],
    ['7d', 'Plan', 'calendar below'],
  ].forEach(([v,l,s])=>{
    const sc = el('div',{class:'stat-card'});
    sc.appendChild(el('div',{class:'stat-val'},v));
    sc.appendChild(el('div',{class:'stat-label'},l));
    sc.appendChild(el('div',{class:'stat-sub'},s));
    sg.appendChild(sc);
  });
  wrap.appendChild(sg);

  // Streak bar (last 14 days)
  wrap.appendChild(el('p',{class:'sec-label'},'14-day streak'));
  const sb = el('div',{class:'streak-row'});
  for (let i=13; i>=0; i--) {
    const d=new Date(today); d.setDate(d.getDate()-i);
    const k=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const hist=state.history[k]||{};
    const keys=state.meds.flatMap(m=>m.times.map(t=>`${m.id}-${t}`));
    const on = keys.length && keys.some(dk=>hist[dk]);
    const isToday = i===0;
    const seg=el('div',{class:`streak-seg${on?' on':''}${isToday?' today':''}`});
    sb.appendChild(seg);
  }
  wrap.appendChild(sb);

  // Weekly bar chart
  wrap.appendChild(el('p',{class:'sec-label'},'This week'));
  const wc = el('div',{class:'week-chart'});
  for (let i=6; i>=0; i--) {
    const d=new Date(today); d.setDate(d.getDate()-i);
    const k=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const hist=state.history[k]||{};
    const keys=state.meds.flatMap(m=>m.times.map(t=>`${m.id}-${t}`));
    const done=keys.filter(dk=>hist[dk]).length;
    const pctH = keys.length ? (done/keys.length) : 0;
    const wrap2=el('div',{class:'week-bar-wrap'});
    const bar=el('div',{class:`week-bar${pctH===0?' dim':''}`, style:{height:`${Math.max(4,Math.round(pctH*72))}px`}});
    wrap2.appendChild(bar);
    wrap2.appendChild(el('div',{class:'week-label'}, DAYS[d.getDay()]));
    wc.appendChild(wrap2);
  }
  wrap.appendChild(wc);

  // Calendar
  wrap.appendChild(el('p',{class:'sec-label'},'Calendar'));
  const chr = el('div',{class:'cal-header-row'});
  DAYS.forEach(d=>chr.appendChild(el('div',{class:'cal-dh'},d)));
  wrap.appendChild(chr);

  const cal = el('div',{class:'cal-grid'});
  const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
  const start = new Date(firstDay); start.setDate(1-start.getDay());
  for (let i=0; i<35; i++) {
    const d = new Date(start); d.setDate(d.getDate()+i);
    const k=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const hist=state.history[k]||{};
    const keys=state.meds.flatMap(m=>m.times.map(t=>`${m.id}-${t}`));
    const isToday=d.toDateString()===today.toDateString();
    const hasMeds=keys.length>0;
    const allDone=hasMeds&&keys.every(dk=>hist[dk]);
    const otherMonth=d.getMonth()!==today.getMonth();
    const cell=el('div',{class:`cal-cell${isToday?' today':allDone?' complete':hasMeds&&!otherMonth?' has':''}${otherMonth?' other-month':''}`, title:k}, d.getDate()+'');
    cal.appendChild(cell);
  }
  wrap.appendChild(cal);
  return wrap;
}

function nowDatetimeLocal() {
  const n = new Date();
  const tz = n.getTimezoneOffset();
  const local = new Date(n.getTime() - tz * 60000);
  return local.toISOString().slice(0,16);
}

function fmtDatetime(dtStr) {
  if (!dtStr) return '';
  const d = new Date(dtStr);
  return d.toLocaleString([], {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function bsrStatus(val) {
  const v = parseFloat(val);
  if (isNaN(v)) return null;
  if (v < 4.0) return {label:'Low',cls:'badge-low'};
  if (v <= 7.8) return {label:'Normal',cls:'badge-normal'};
  if (v <= 11.0) return {label:'High',cls:'badge-high'};
  return {label:'Very High',cls:'badge-danger'};
}

function bpStatus(sys, dia) {
  const s = parseFloat(sys), d = parseFloat(dia);
  if (isNaN(s)||isNaN(d)) return null;
  if (s < 90 || d < 60) return {label:'Low',cls:'badge-low'};
  if (s <= 120 && d <= 80) return {label:'Normal',cls:'badge-normal'};
  if (s <= 139 || d <= 89) return {label:'Elevated',cls:'badge-high'};
  return {label:'High',cls:'badge-danger'};
}

function openVitalForm(type) {
  ui.vitalForm = { type, datetime: nowDatetimeLocal(), bsr:'', systolic:'', diastolic:'', notes:'' };
  ui.modal = 'vital-form';
  render();
}

function saveVital() {
  const f = ui.vitalForm;
  if (f.type === 'bsr' && !f.bsr) { showToast('Enter a BSR value','ti-alert-circle'); return; }
  if (f.type === 'bp' && (!f.systolic || !f.diastolic)) { showToast('Enter both BP values','ti-alert-circle'); return; }
  state.readings.push({ id: uid(), type: f.type, datetime: f.datetime, bsr: f.bsr, systolic: f.systolic, diastolic: f.diastolic, notes: f.notes });
  state.readings.sort((a,b) => new Date(b.datetime) - new Date(a.datetime));
  saveState();
  ui.modal = null; ui.vitalForm = null;
  showToast('Reading saved', 'ti-check');
  render();
}

function deleteReading(id) {
  state.readings = state.readings.filter(r => r.id !== id);
  saveState();
  showToast('Reading deleted', 'ti-trash');
  render();
}

function todayDateStr() {
  const n = new Date();
  return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
}
function monthAgoStr() {
  const n = new Date(); n.setMonth(n.getMonth()-1);
  return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
}

function openExportModal(type) {
  ui.exportModal = { type, dateFrom: monthAgoStr(), dateTo: todayDateStr() };
  ui.modal = 'export';
  render();
}

function filteredReadings() {
  const { type, dateFrom, dateTo } = ui.exportModal;
  const from = dateFrom ? new Date(dateFrom + 'T00:00:00') : null;
  const to   = dateTo   ? new Date(dateTo   + 'T23:59:59') : null;
  return state.readings
    .filter(r => r.type === type)
    .filter(r => {
      const d = new Date(r.datetime);
      if (from && d < from) return false;
      if (to   && d > to)   return false;
      return true;
    })
    .sort((a,b) => new Date(a.datetime) - new Date(b.datetime));
}

function downloadCSV() {
  const rows = filteredReadings();
  const { type } = ui.exportModal;
  let csv = '';
  if (type === 'bsr') {
    csv += 'Date,Time,BSR (mmol/L),Status,Notes\n';
    rows.forEach(r => {
      const d = new Date(r.datetime);
      const st = bsrStatus(r.bsr);
      csv += `"${d.toLocaleDateString()}","${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}","${parseFloat(r.bsr).toFixed(1)}","${st?.label||''}","${(r.notes||'').replace(/"/g,"'")}"\n`;
    });
  } else {
    csv += 'Date,Time,Systolic (mmHg),Diastolic (mmHg),Status,Notes\n';
    rows.forEach(r => {
      const d = new Date(r.datetime);
      const st = bpStatus(r.systolic, r.diastolic);
      csv += `"${d.toLocaleDateString()}","${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}","${r.systolic}","${r.diastolic}","${st?.label||''}","${(r.notes||'').replace(/"/g,"'")}"\n`;
    });
  }
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const label = type === 'bsr' ? 'BSR' : 'BP';
  a.download = `MedTrack_${label}_${ui.exportModal.dateFrom}_to_${ui.exportModal.dateTo}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  ui.modal = null; ui.exportModal = null;
  showToast('CSV downloaded', 'ti-download');
  render();
}

      <tbody>`;

    <h1>MedTrack — ${label} Report</h1>
    <div class="print-meta">Period: ${dateFrom} to ${dateTo} &nbsp;·&nbsp; ${rows.length} reading(s) &nbsp;·&nbsp; Average: ${avg} &nbsp;·&nbsp; Generated: ${new Date().toLocaleString()}</div>

function renderVitals() {
  const wrap = el('div',{});

    toggle.appendChild(btn);
  });
  wrap.appendChild(toggle);

  // ── Summary cards ──
  const latest = readings[0] || null;
  if (type === 'bsr') {
    const vals = readings.map(r=>parseFloat(r.bsr)).filter(v=>!isNaN(v));
    const last = vals[0];
    const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : null;
    const min = vals.length ? Math.min(...vals) : null;
    const st = last != null ? bsrStatus(last) : null;
    const sg = el('div',{class:'vitals-summary'});
    [
      [last!=null?last.toFixed(1):'—', 'mmol/L', 'Latest', st],
      [avg!=null?avg.toFixed(1):'—', 'mmol/L', 'Average', null],
      [min!=null?min.toFixed(1):'—', 'mmol/L', 'Lowest', null],
    ].forEach(([v,unit,label,status]) => {
      const c = el('div',{class:'vs-card'});
      const vcls = status ? (status.cls==='badge-normal'?'ok':status.cls==='badge-low'?'ok':'danger') : '';
      c.appendChild(el('div',{class:`vs-val${vcls?' '+vcls:''}`}, v));
      c.appendChild(el('div',{class:'vs-unit'}, unit));
      c.appendChild(el('div',{class:'vs-label'}, label));
      sg.appendChild(c);
    });
    wrap.appendChild(sg);
  } else {
    const sysList = readings.map(r=>parseFloat(r.systolic)).filter(v=>!isNaN(v));
    const diaList = readings.map(r=>parseFloat(r.diastolic)).filter(v=>!isNaN(v));
    const lastSys = sysList[0], lastDia = diaList[0];
    const avgSys = sysList.length ? Math.round(sysList.reduce((a,b)=>a+b,0)/sysList.length) : null;
    const avgDia = diaList.length ? Math.round(diaList.reduce((a,b)=>a+b,0)/diaList.length) : null;
    const st = (lastSys&&lastDia) ? bpStatus(lastSys,lastDia) : null;
    const sg = el('div',{class:'vitals-summary'});
    [
      [(lastSys&&lastDia)?`${lastSys}/${lastDia}`:'—', 'mmHg', 'Latest', st],
      [(avgSys&&avgDia)?`${avgSys}/${avgDia}`:'—', 'mmHg', 'Average', null],
      [readings.length+'', 'readings', 'Total', null],
    ].forEach(([v,unit,label,status]) => {
      const c = el('div',{class:'vs-card'});
      const vcls = status ? (status.cls==='badge-normal'?'ok':status.cls.includes('danger')?'danger':'warn') : '';
      c.appendChild(el('div',{class:`vs-val${vcls?' '+vcls:''}`}, v));
      c.appendChild(el('div',{class:'vs-unit'}, unit));
      c.appendChild(el('div',{class:'vs-label'}, label));
      sg.appendChild(c);
    });
    wrap.appendChild(sg);
  }

  // ── Mini trend chart (last 10) ──
  if (readings.length > 1) {
    wrap.appendChild(el('p',{class:'sec-label'},'Trend — last 10 readings'));
    const last10 = readings.slice(0,10).reverse();
    const chart = el('div',{class:'mini-chart'});
    if (type === 'bsr') {
      const vals = last10.map(r=>parseFloat(r.bsr)||0);
      const max = Math.max(...vals, 10);
      vals.forEach((v,i) => {
        const pct = max ? v/max : 0;
        const st2 = bsrStatus(v);
        const color = st2?.cls==='badge-normal'?'var(--green-mid)':st2?.cls==='badge-low'?'var(--blue)':st2?.cls==='badge-high'?'var(--orange)':'var(--red)';
        chart.appendChild(el('div',{class:'mini-bar',style:{height:`${Math.max(4,Math.round(pct*32))}px`,background:color}}));
      });
    } else {
      const vals = last10.map(r=>parseFloat(r.systolic)||0);
      const max = Math.max(...vals, 140);
      vals.forEach(v => {
        const pct = max ? v/max : 0;
        const st2 = bpStatus(v, v*0.65);
        const color = st2?.cls==='badge-normal'?'var(--green-mid)':st2?.cls==='badge-low'?'var(--blue)':st2?.cls==='badge-high'?'var(--orange)':'var(--red)';
        chart.appendChild(el('div',{class:'mini-bar',style:{height:`${Math.max(4,Math.round(pct*32))}px`,background:color}}));
      });
    }
    wrap.appendChild(chart);
    const chartLabels = el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'14px'}});
    chartLabels.appendChild(el('span',{style:{fontSize:'10px',color:'var(--text3)'}}, readings.length>1?fmtDatetime(readings[Math.min(9,readings.length-1)].datetime).split(',')[0]:''));
    chartLabels.appendChild(el('span',{style:{fontSize:'10px',color:'var(--text3)'}}, 'Latest'));
    wrap.appendChild(chartLabels);
  }

  // ── Add button ──
  const addBtn = el('button',{class:'add-vital-btn', onclick:()=>openVitalForm(type)});
  addBtn.appendChild(icon(type==='bsr'?'droplet-plus':'heart-plus'));
  addBtn.appendChild(el('span',{}, type==='bsr'?'Add BSR Reading':'Add BP Reading'));
  wrap.appendChild(addBtn);

  // ── Export bar ──
  if (readings.length) {
    const exportBar = el('div',{class:'export-bar'});
    exportBar.appendChild(icon('download'));
    exportBar.appendChild(el('span',{class:'export-bar-label'}, `Export ${readings.length} reading(s)`));
    const ecsvBtn = el('button',{class:'export-btn csv',onclick:()=>openExportModal(type)});
    ecsvBtn.appendChild(icon('table-export')); ecsvBtn.appendChild(el('span',{},'Export'));
    exportBar.appendChild(ecsvBtn);
    wrap.appendChild(exportBar);
  }

  // ── Readings list ──
  if (!readings.length) {
    const empty = el('div',{class:'empty'});
    empty.appendChild(icon(type==='bsr'?'droplet-off':'heart-off'));
    empty.appendChild(el('p',{}, type==='bsr'?'No BSR readings yet':'No BP readings yet'));
    empty.appendChild(el('small',{}, 'Tap the button above to log your first reading'));
    wrap.appendChild(empty);
  } else {
    wrap.appendChild(el('p',{class:'sec-label'}, 'All readings'));
    readings.forEach(r => {
      const card = el('div',{class:'reading-card'});
      const ico = el('div',{class:`reading-icon ${r.type}`});
      ico.appendChild(icon(r.type==='bsr'?'droplet':'heart'));
      card.appendChild(ico);
      const info = el('div',{class:'reading-info'});
      if (r.type === 'bsr') {
        const vDiv = el('div',{class:'reading-val'});
        vDiv.appendChild(text(parseFloat(r.bsr).toFixed(1)));
        vDiv.appendChild(el('span',{class:'unit'},'mmol/L'));
        info.appendChild(vDiv);
        const st2 = bsrStatus(r.bsr);
        if (st2) { const b=el('div',{class:`reading-badge ${st2.cls}`}); b.appendChild(icon('circle-filled','')); b.appendChild(text(' '+st2.label)); info.appendChild(b); }
      } else {
        const vDiv = el('div',{class:'reading-val'});
        vDiv.appendChild(text(`${r.systolic}/${r.diastolic}`));
        vDiv.appendChild(el('span',{class:'unit'},'mmHg'));
        info.appendChild(vDiv);
        const st2 = bpStatus(r.systolic, r.diastolic);
        if (st2) { const b=el('div',{class:`reading-badge ${st2.cls}`}); b.appendChild(icon('circle-filled','')); b.appendChild(text(' '+st2.label)); info.appendChild(b); }
      }
      info.appendChild(el('div',{class:'reading-meta'}, fmtDatetime(r.datetime)));
      if (r.notes) info.appendChild(el('div',{class:'reading-notes-text'}, r.notes));
      card.appendChild(info);
      const del = el('button',{class:'reading-del','aria-label':'Delete', onclick:()=>deleteReading(r.id)});
      del.appendChild(icon('trash')); card.appendChild(del);
      wrap.appendChild(card);
    });
  }
  return wrap;
}

// ═══════════════════════════════════════════════════
//  VITAL FORM MODAL
// ═══════════════════════════════════════════════════
function renderVitalModal() {
  const f = ui.vitalForm;
  const isBsr = f.type === 'bsr';
  const backdrop = el('div',{class:'modal-backdrop', onclick:(e)=>{if(e.target===backdrop){ui.modal=null;ui.vitalForm=null;render();}}});
  const sheet = el('div',{class:'modal-sheet'});
  sheet.appendChild(el('div',{class:'modal-handle'}));
  sheet.appendChild(el('div',{class:'modal-title'}, isBsr?'Log Blood Sugar (BSR)':'Log Blood Pressure (BP)'));

  // Date & time (default = now, editable)
  const gdt = el('div',{class:'form-group'});
  gdt.appendChild(el('label',{class:'form-label'},'Date & Time'));
  gdt.appendChild(el('input',{class:'form-input',type:'datetime-local',value:f.datetime,
    oninput:(e)=>{ f.datetime=e.target.value; }}));
  sheet.appendChild(gdt);

  if (isBsr) {
    const g1 = el('div',{class:'form-group'});
    g1.appendChild(el('label',{class:'form-label'},'Blood Sugar Level'));
    const wrap2 = el('div',{class:'form-unit-wrap'});
    const inp = el('input',{class:'form-input',type:'number',step:'0.1',min:'1',max:'30',placeholder:'e.g. 5.4',value:f.bsr,
      oninput:(e)=>{ f.bsr=e.target.value; }});
    inp.style.paddingRight = '60px';
    wrap2.appendChild(inp);
    wrap2.appendChild(el('span',{class:'form-unit-label'},'mmol/L'));
    g1.appendChild(wrap2);
    g1.appendChild(el('div',{class:'range-guide'},'Normal fasting: 4.0–5.9 · Post-meal: 4.0–7.8'));
    sheet.appendChild(g1);
  } else {
    const grid = el('div',{class:'vital-form-grid'});
    const g1 = el('div',{class:'form-group',style:{margin:0}});
    g1.appendChild(el('label',{class:'form-label'},'Systolic (upper)'));
    const w1 = el('div',{class:'form-unit-wrap'});
    const i1 = el('input',{class:'form-input',type:'number',min:'60',max:'250',placeholder:'e.g. 120',value:f.systolic,
      oninput:(e)=>{ f.systolic=e.target.value; }});
    i1.style.paddingRight = '48px';
    w1.appendChild(i1); w1.appendChild(el('span',{class:'form-unit-label'},'mmHg'));
    g1.appendChild(w1); grid.appendChild(g1);
    const g2 = el('div',{class:'form-group',style:{margin:0}});
    g2.appendChild(el('label',{class:'form-label'},'Diastolic (lower)'));
    const w2 = el('div',{class:'form-unit-wrap'});
    const i2 = el('input',{class:'form-input',type:'number',min:'40',max:'150',placeholder:'e.g. 80',value:f.diastolic,
      oninput:(e)=>{ f.diastolic=e.target.value; }});
    i2.style.paddingRight = '48px';
    w2.appendChild(i2); w2.appendChild(el('span',{class:'form-unit-label'},'mmHg'));
    g2.appendChild(w2); grid.appendChild(g2);
    sheet.appendChild(grid);
    const guide = el('div',{class:'form-group'});
    guide.appendChild(el('div',{class:'range-guide'},'Normal: below 120/80 · Elevated: 120–139/80–89 · High: 140+/90+'));
    sheet.appendChild(guide);
  }

  // Notes
  const gn = el('div',{class:'form-group'});
  gn.appendChild(el('label',{class:'form-label'},'Notes (optional)'));
  gn.appendChild(el('input',{class:'form-input',type:'text',placeholder:'e.g. After meal, feeling dizzy…',value:f.notes,
    oninput:(e)=>{ f.notes=e.target.value; }}));
  sheet.appendChild(gn);

  const actions = el('div',{class:'modal-actions'});
  const cancel = el('button',{class:'btn-cancel',onclick:()=>{ui.modal=null;ui.vitalForm=null;render();}},'Cancel');
  const save = el('button',{class:'btn-save',onclick:saveVital},'Save reading');
  actions.appendChild(cancel); actions.appendChild(save);
  sheet.appendChild(actions);
  backdrop.appendChild(sheet);
  return backdrop;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Show auth if not logged in
  if (!currentUser) {
    app.appendChild(renderAuthScreen());
    if (ui.toast) {
      const t = el('div',{class:'toast'});
      t.appendChild(icon(ui.toast.icon)); t.appendChild(text(ui.toast.msg));
      app.appendChild(t);
    }
    return;
  }

  app.appendChild(renderHeader());
  app.appendChild(renderTabs());

  const scroll = el('div',{class:'scroll-area'});
  if (ui.tab==='today') scroll.appendChild(renderToday());
  if (ui.tab==='schedule') scroll.appendChild(renderSchedule());
  if (ui.tab==='vitals') scroll.appendChild(renderVitals());
  if (ui.tab==='scan') scroll.appendChild(renderScan());
  if (ui.tab==='history') scroll.appendChild(renderHistory());
  app.appendChild(scroll);

  if (ui.modal === 'add-med') app.appendChild(renderAddModal());
  if (ui.modal === 'vital-form') app.appendChild(renderVitalModal());
  if (ui.modal === 'export') app.appendChild(renderExportModal());

  if (ui.toast) {
    const t = el('div',{class:'toast'});
    t.appendChild(icon(ui.toast.icon)); t.appendChild(text(ui.toast.msg));
    app.appendChild(t);
  }
}

// ═══════════════════════════════════════════════════
//  AUTH LOGIC
// ═══════════════════════════════════════════════════
async function authSubmitPhone() {
  const phone = ui.authPhone.trim().replace(/\s+/g,'');
  if (phone.length < 7) { ui.authError = 'Enter a valid phone number'; render(); return; }
  ui.authLoading = true; ui.authError = ''; render();
  try {
    const user = await fbGetUser(phone);
    ui.authUserExists = !!user;
    ui.authScreen = user ? 'pin-login' : 'pin-setup';
    ui.authPin = '';
  } catch(e) {
    ui.authError = 'Connection error — check your internet';
  }
  ui.authLoading = false; render();
}

async function authSubmitPin() {
  const phone = ui.authPhone.trim().replace(/\s+/g,'');
  const pinHash = await hashPin(ui.authPin);
  ui.authLoading = true; ui.authError = ''; render();
  try {
    const user = await fbGetUser(phone);
    if (!user || user.pinHash !== pinHash) {
      ui.authError = 'Incorrect PIN'; ui.authPin = '';
      ui.authLoading = false; render(); return;
    }
    await loginUser(phone);
  } catch(e) {
    ui.authError = 'Connection error — check your internet';
    ui.authLoading = false; render();
  }
}

async function authSetupPin() {
  if (ui.authPin.length < 4) { ui.authError = 'PIN must be 4 digits'; render(); return; }
  ui.authScreen = 'pin-confirm'; ui.authPinConfirm = ''; render();
}

async function authConfirmPin() {
  if (ui.authPin !== ui.authPinConfirm) {
    ui.authError = 'PINs do not match'; ui.authPinConfirm = ''; render(); return;
  }
  const phone = ui.authPhone.trim().replace(/\s+/g,'');
  const pinHash = await hashPin(ui.authPin);
  ui.authLoading = true; ui.authError = ''; render();
  try {
    await fbCreateUser(phone, pinHash);
    await loginUser(phone);
  } catch(e) {
    ui.authError = 'Could not create account — try again';
    ui.authLoading = false; render();
  }
}

async function loginUser(phone) {
  currentUser = { phone };
  localStorage.setItem('medtrack_session', phone);
  // Load their data from Firestore
  const data = await fbLoadData(phone);
  if (data) {
    state = { meds: data.meds||[], history: data.history||{}, readings: data.readings||[], notifAsked: data.notifAsked||false };
  } else {
    state = freshState();
  }
  ui.authPin = ''; ui.authPinConfirm = ''; ui.authError = '';
  ui.authLoading = false;
  showToast(`Welcome back!`, 'ti-home');
  render();
  scheduleNotifications();
}

function logout() {
  currentUser = null;
  state = freshState();
  localStorage.removeItem('medtrack_session');
  ui.authScreen = 'phone'; ui.authPhone = ''; ui.authPin = '';
  ui.authPinConfirm = ''; ui.authError = ''; ui.authLoading = false;
  ui.showLogout = false; ui.tab = 'today';
  render();
}

// PIN keypad handler
function pinKeyPress(key) {
  const isConfirm = ui.authScreen === 'pin-confirm';
  const current = isConfirm ? ui.authPinConfirm : ui.authPin;
  ui.authError = '';
  if (key === 'del') {
    if (isConfirm) ui.authPinConfirm = current.slice(0,-1);
    else ui.authPin = current.slice(0,-1);
    render(); return;
  }
  if (current.length >= 4) return;
  const next = current + key;
  if (isConfirm) ui.authPinConfirm = next;
  else ui.authPin = next;
  render();
  // Auto-submit when 4 digits entered
  if (next.length === 4) {
    setTimeout(() => {
      if (ui.authScreen === 'pin-login') authSubmitPin();
      else if (ui.authScreen === 'pin-setup') authSetupPin();
      else if (ui.authScreen === 'pin-confirm') authConfirmPin();
    }, 180);
  }
}

// ── Auth screen renderer ──
function renderAuthScreen() {
  const screen = el('div',{class:'auth-screen'});
  screen.appendChild(el('div',{class:'auth-logo'},'MedTrack'));
  screen.appendChild(el('div',{class:'auth-tagline'},'Your personal health companion'));

  const card = el('div',{class:'auth-card'});

  if (ui.authLoading) {
    const ld = el('div',{class:'auth-loading'});
    ld.appendChild(icon('loader-2')); ld.appendChild(el('span',{},'Please wait…'));
    card.appendChild(ld);
    screen.appendChild(card);
    return screen;
  }

  // ── Phone entry ──
  if (ui.authScreen === 'phone') {
    card.appendChild(el('div',{class:'auth-card-title'},'Welcome'));
    card.appendChild(el('div',{class:'auth-card-sub'},'Enter your phone number to continue'));
    const iw = el('div',{class:'auth-input-wrap'});
    iw.appendChild(icon('phone', 'auth-input-icon'));
    const inp = el('input',{class:'auth-input',type:'tel',placeholder:'e.g. 03001234567',
      value: ui.authPhone,
      oninput: (e)=>{ ui.authPhone=e.target.value; ui.authError=''; },
      onkeydown: (e)=>{ if(e.key==='Enter') authSubmitPhone(); }
    });
    iw.appendChild(inp);
    card.appendChild(iw);
    card.appendChild(el('div',{class:'auth-error'}, ui.authError));
    const btn = el('button',{class:'auth-btn', onclick:authSubmitPhone});
    btn.appendChild(icon('arrow-right')); btn.appendChild(el('span',{},'Continue'));
    card.appendChild(btn);
    // Auto-focus
    setTimeout(()=>inp.focus(), 50);
  }

  // ── PIN login ──
  if (ui.authScreen === 'pin-login') {
    card.appendChild(el('div',{class:'auth-card-title'},'Enter your PIN'));
    card.appendChild(el('div',{class:'auth-card-sub'}, ui.authPhone));
    renderPinDots(card, ui.authPin, !!ui.authError);
    card.appendChild(el('div',{class:'auth-error'}, ui.authError));
    renderPinPad(card);
  }

  // ── PIN setup ──
  if (ui.authScreen === 'pin-setup') {
    card.appendChild(el('div',{class:'auth-card-title'},'Create a PIN'));
    card.appendChild(el('div',{class:'auth-card-sub'},'Choose a 4-digit PIN for your account'));
    renderPinDots(card, ui.authPin, false);
    card.appendChild(el('div',{class:'auth-error'}, ui.authError));
    renderPinPad(card);
  }

  // ── PIN confirm ──
  if (ui.authScreen === 'pin-confirm') {
    card.appendChild(el('div',{class:'auth-card-title'},'Confirm your PIN'));
    card.appendChild(el('div',{class:'auth-card-sub'},'Enter the same PIN again'));
    renderPinDots(card, ui.authPinConfirm, !!ui.authError);
    card.appendChild(el('div',{class:'auth-error'}, ui.authError));
    renderPinPad(card);
  }

  screen.appendChild(card);

  // Back button (not on phone screen)
  if (ui.authScreen !== 'phone') {
    const back = el('button',{class:'auth-back', onclick:()=>{
      ui.authScreen='phone'; ui.authPin=''; ui.authPinConfirm=''; ui.authError=''; render();
    }}, '← Use a different number');
    screen.appendChild(back);
  }

  return screen;
}

function renderPinDots(parent, pin, isError) {
  const dots = el('div',{class:'pin-dots'});
  for (let i=0;i<4;i++) {
    const d = el('div',{class:`pin-dot${pin.length>i?' filled':''}${isError?' error':''}`});
    dots.appendChild(d);
  }
  parent.appendChild(dots);
}

function renderPinPad(parent) {
  const pad = el('div',{class:'pin-pad'});
  ['1','2','3','4','5','6','7','8','9','','0','del'].forEach(k => {
    if (k === '') { pad.appendChild(el('div',{class:'pin-key empty'})); return; }
    const btn = el('button',{class:`pin-key${k==='del'?' del':''}`, onclick:()=>pinKeyPress(k)});
    btn.appendChild(k==='del' ? icon('backspace') : el('span',{},k));
    pad.appendChild(btn);
  });
  parent.appendChild(pad);
}

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
loadState();

// Check for saved session
const savedPhone = localStorage.getItem('medtrack_session');
if (savedPhone) {
  ui.authLoading = true; render();
  loginUser(savedPhone).catch(()=>{
    localStorage.removeItem('medtrack_session');
    ui.authLoading = false; render();
  });
} else {
  render();
}

// Refresh every minute to update statuses
setInterval(() => {
  if (currentUser && ui.tab === 'today') render();
}, 60000);
</script>
